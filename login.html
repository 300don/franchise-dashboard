<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · 프랜차이즈 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  /* Logo */
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #00c4b4, #0095d9);
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(0,196,180,0.35);
  }
  .logo-area h1 {
    color: white;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo-area p {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 6px;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 36px 32px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.5;
  }
  .form-group input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.3); }
  .form-group input:focus {
    border-color: #00c4b4;
    background: rgba(0,196,180,0.08);
  }

  .error-msg {
    display: none;
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(255,107,107,0.1);
    border-radius: 8px;
    border-left: 3px solid #ff6b6b;
  }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #00c4b4, #0095d9);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.3px;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.12);
  }
  .divider span { color: rgba(255,255,255,0.35); font-size: 12px; }

  .hint {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    margin-top: 20px;
  }
  .hint b { color: rgba(255,255,255,0.6); }

  /* Loading state */
  .btn-login.loading {
    pointer-events: none;
    opacity: 0.7;
  }
  .btn-login.loading::after {
    content: '';
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Shake animation */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">🛵</div>
    <h1>프랜차이즈 관리 시스템</h1>
    <p>매출 분석 · 직원 출퇴근 관리</p>
  </div>

  <div class="card" id="loginCard">
    <div class="form-group">
      <label>아이디</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="username" placeholder="아이디를 입력하세요" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label>비밀번호</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>
    </div>

    <div class="error-msg" id="errorMsg">아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">로그인</button>

    <div class="divider"><span>테스트 계정</span></div>
    <div class="hint">아이디 <b>admin</b> · 비밀번호 <b>1234</b></div>
  </div>
</div>

<script>
  // 테스트 계정 (실제 서비스 시 서버 인증으로 교체)
  const ACCOUNTS = {
    'admin': '1234',
    'manager': '5678',
  };

  function doLogin() {
    const id = document.getElementById('username').value.trim();
    const pw = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const card = document.getElementById('loginCard');

    if (!id || !pw) {
      err.style.display = 'block';
      err.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
      return;
    }

    // 로딩
    btn.classList.add('loading');
    btn.textContent = '로그인 중';

    setTimeout(() => {
      if (ACCOUNTS[id] && ACCOUNTS[id] === pw) {
        // 성공 → 대시보드로 이동
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('user', id);
        window.location.href = 'baemin_dashboard.html';
      } else {
        btn.classList.remove('loading');
        btn.textContent = '로그인';
        err.style.display = 'block';
        err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
      }
    }, 800);
  }

  // 엔터키 로그인
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // 이미 로그인 상태면 바로 이동
  if (sessionStorage.getItem('loggedIn') === 'true') {
    window.location.href = 'baemin_dashboard.html';
  }
</script>
</body>
</html>
