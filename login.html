<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 · 삼백돈 돈가츠 프랜차이즈 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-logo {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ffffff, #dcdcdc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-area h1 {
    color: rgba(255, 255, 255, 0.75);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 40px 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  }

  .card-title {
    color: white;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 28px;
    letter-spacing: -0.5px;
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.5;
  }
  .form-group input {
    width: 100%;
    padding: 14px 14px 14px 42px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: white;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.3); }
  .form-group input:focus {
    border-color: #00c4b4;
    background: rgba(0,196,180,0.08);
  }
  .form-group input.error-input {
    border-color: #ff6b6b;
    background: rgba(255,107,107,0.08);
  }

  .error-msg {
    display: none;
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(255,107,107,0.1);
    border-radius: 8px;
    border-left: 3px solid #ff6b6b;
  }
  .error-msg.show { display: block; }

  .btn-login {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #00c4b4, #0095d9);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.3px;
    box-shadow: 0 8px 20px rgba(0, 196, 180, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { pointer-events: none; opacity: 0.7; }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .btn-login.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    text-align: center;
    margin: 20px 0 4px;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="logo-area">
    <div class="brand-logo">🍱 삼백돈</div>
    <h1>돈가츠 프랜차이즈 관리 시스템</h1>
  </div>

  <div class="card">
    <p class="card-title">로그인</p>

    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="username">아이디</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input
            type="text"
            id="username"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
            autofocus
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="error-msg" id="errorMsg">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner"></span>
        <span class="btn-text">로그인</span>
      </button>

    </form>

    <div class="divider">관리자 계정으로 로그인하세요</div>
  </div>

</div>

<script>
  const ACCOUNTS = [
    { id: 'admin',   pw: '300don',   name: '관리자', role: 'admin' },
    { id: 'manager', pw: 'manager1', name: '매니저', role: 'manager' },
  ];

  function handleLogin(e) {
    e.preventDefault();

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const errorMsg   = document.getElementById('errorMsg');
    const loginBtn   = document.getElementById('loginBtn');

    const id = usernameEl.value.trim();
    const pw = passwordEl.value;

    if (!id || !pw) {
      showError('아이디와 비밀번호를 모두 입력해주세요.');
      return;
    }

    loginBtn.classList.add('loading');
    loginBtn.disabled = true;
    errorMsg.classList.remove('show');
    usernameEl.classList.remove('error-input');
    passwordEl.classList.remove('error-input');

    setTimeout(() => {
      const account = ACCOUNTS.find(a => a.id === id && a.pw === pw);

      if (account) {
        sessionStorage.setItem('user', JSON.stringify({
          id: account.id,
          name: account.name,
          role: account.role,
        }));
        window.location.href = 'index.html';
      } else {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        showError('아이디 또는 비밀번호가 올바르지 않습니다.');
        usernameEl.classList.add('error-input');
        passwordEl.classList.add('error-input');
        passwordEl.value = '';
        passwordEl.focus();
      }
    }, 800);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById(id).classList.remove('error-input');
    });
  });
</script>

</body>
</html>
